name: build image
on:
  pull_request:
    branches:
      - main
    paths:
      - '**'
      - '!**/README.md'
      - '!**/README.org'
      - '!**/renovate.json'
      - '!.forgejo/**'
      - '.forgejo/workflows/build.yml'
  push:
    branches:
      - main
    paths:
      - '**'
      - '!**/README.md'
      - '!**/README.org'
      - '!**/renovate.json'
      - '!.forgejo/**'
      - '.forgejo/workflows/build.yml'
  workflow_dispatch:

env:
  REGISTRY: forgejo.clmnt.xyz
  OWNER: ${{ forgejo.actor }}
  REPOSITORY: ${{ forgejo.repository }}
  IMAGE_TAGS: ${{ forgejo.sha }} latest

  LOGLEVEL: warn # warn is the default value

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref || forgejo.run_id }}
  cancel-in-progress: ${{ forgejo.event_name == 'pull_request' }}

jobs:
  build-push:
    name: build image
    runs-on: podman
    container:
      image: ghcr.io/clement-dufour/actions-runner@sha256:715faeb253440230bc1df95de64064bf73f989f21069559ac6e96b5f90ee2afa
      options:
        --volume containers_storage:/home/podman/.local/share/containers/storage:z
    strategy:
      fail-fast: false
      matrix:
        container:
          - emacs-toolbox
          - fedora-toolbox
          - actions-runner

    steps:
      - name: checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: change containers signature policy
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          mkdir -p "${HOME}/.config/containers/registries.d"

          cat << EOF > "${HOME}/.config/containers/registries.d/default-docker.yaml"
          default-docker:
            use-sigstore-attachments: true
          EOF

      - name: build
        id: build
        env:
          IMAGE: ${{ matrix.container }}
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          image_with_tag=""
          for tag in ${IMAGE_TAGS}; do
            if [ -z "${image_with_tag}" ]; then
              image_with_tag="${REGISTRY}/${OWNER}/${IMAGE}:${tag}"
              buildah --log-level "${LOGLEVEL}" bud --file "${FORGEJO_WORKSPACE}/${IMAGE}/Containerfile" --format oci --tag "${image_with_tag}" "${FORGEJO_WORKSPACE}/${IMAGE}"
            else
              buildah --log-level "${LOGLEVEL}" tag "${image_with_tag}" "${REGISTRY}/${OWNER}/${IMAGE}:${tag}"
            fi
          done

          {
            printf 'image-with-tag=%s\n' "${image_with_tag}"
          } >> "${FORGEJO_OUTPUT}"

      - name: login to container registry
        id: login
        if: (forgejo.event_name == 'push' || forgejo.event_name == 'workflow_dispatch') && forgejo.ref == 'refs/heads/main'
        env:
          REGISTRY_USER: ${{ forgejo.actor }}
          REGISTRY_PASSWORD: ${{ secrets.TOKEN_PACKAGES_RW }}
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          podman --log-level "${LOGLEVEL}" login --username "${REGISTRY_USER}" --password "${REGISTRY_PASSWORD}" "${REGISTRY}"

      - name: push to registry
        id: push
        if: (forgejo.event_name == 'push' || forgejo.event_name == 'workflow_dispatch') && forgejo.ref == 'refs/heads/main'
        env:
          IMAGE: ${{ matrix.container }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          for tag in ${IMAGE_TAGS}; do
            podman --log-level "${LOGLEVEL}" push --sign-by-sigstore-private-key <(printf '%s\n' "${COSIGN_PRIVATE_KEY}") "${REGISTRY}/${OWNER}/${IMAGE}:${tag}"
          done

      - name: logout from container registry
        if: always() && (steps.login.outcome == 'success' || steps.login.outcome == 'failure' )
        shell: bash --noprofile --norc -e -o nounset -o pipefail {0}
        run: |
          podman --log-level "${LOGLEVEL}" logout "${REGISTRY}"
