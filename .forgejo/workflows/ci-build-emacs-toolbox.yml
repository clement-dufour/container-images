name: build emacs-toolbox
on:
  workflow_dispatch:
  push:
    branches:
      - 'main'
      - 'renovate/**'
    paths:
      - 'emacs-toolbox/**'
      - '!**/README.md'
      - '!**/README.org'
      - '!**/renovate.json'
      - '!.forgejo/**'
  pull_request:
    branches:
      - 'main'
    paths:
      - 'emacs-toolbox/**'
      - '!**/README.md'
      - '!**/README.org'
      - '!**/renovate.json'
      - '!.forgejo/**'

concurrency:
  group: ${{ forgejo.workflow }}-${{ forgejo.ref || forgejo.run_id }}
  cancel-in-progress: ${{ forgejo.event_name == 'pull_request' }}

jobs:
  build:
    name: build
    runs-on: podman-builder
    uses: clmnt/container-images/.forgejo/workflows/reusable-build.yml@742e14b53085fc95291b2c79eb7324fd06276485 # v1.0.0
    strategy:
      fail-fast: false
      matrix:
        image:
          - emacs-toolbox

    with:
      image-names: |
        forgejo.clmnt.xyz/${{ forgejo.actor }}/${{ matrix.image }}:${{ forgejo.sha }}
        forgejo.clmnt.xyz/${{ forgejo.actor }}/${{ matrix.image }}:latest
      containerfiles: ${{ matrix.image }}/Containerfile
      context: ${{ matrix.image }}
    secrets:
      registry-user: ${{ forgejo.actor }}
      registry-password: ${{ secrets.TOKEN_PACKAGES_RW }}
      sigstore-private-key: ${{ secrets.COSIGN_PRIVATE_KEY }}
